<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Invitation</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: serif; }
    
    /* පින්තූර කෙලින්ම ෆෝල්ඩරයෙන් ගන්නවා */
    .desk-bg {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-image: url('table.jpg'); 
      background-size: cover; background-position: center;
      transition: filter 1s; z-index: 1;
    }

    .dark-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0); transition: background 1.5s; z-index: 2; pointer-events: none; }

    .envelope-cover {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-5deg);
      width: 320px; height: 450px;
      background-image: url('card.png'); 
      background-size: contain; background-repeat: no-repeat; background-position: center;
      cursor: pointer; z-index: 4; transition: all 1s;
    }

    .inner-card {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8) rotate(-5deg); 
      width: 300px; height: 420px; opacity: 0; z-index: 3;
      transition: all 1.5s cubic-bezier(0.25, 1, 0.5, 1); box-shadow: 0 15px 35px rgba(0,0,0,0.5);
    }
    .inner-card img { width: 100%; height: 100%; display: block; border-radius: 5px; }

    /* Animation */
    .open-state .desk-bg { filter: blur(5px); }
    .open-state .dark-overlay { background: rgba(0,0,0,0.6); }
    .open-state .envelope-cover { transform: translate(-50%, -40%) scale(0.9) rotate(-5deg); opacity: 0.4; }
    .open-state .inner-card { transform: translate(-50%, -50%) scale(1.1) rotate(0deg); opacity: 1; z-index: 10; }

    /* නම සහ ඉරි */
    .text-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 11; }
    .strike-line { position: absolute; height: 2px; background: #333; top: 52%; display: none; }
    #strike-rev { left: 8%; width: 9%; }
    #strike-mr { left: 18%; width: 7%; }
    #strike-mrs { left: 26%; width: 9%; }
    #strike-miss { left: 36%; width: 10%; }

    #guest-name { position: absolute; top: 50.5%; left: 48%; font-size: 16px; font-weight: bold; color: #000; font-family: 'Times New Roman', serif; }
  </style>
</head>
<body>

<div class="desk-bg"></div>
<div class="dark-overlay"></div>
<div class="envelope-cover" onclick="openEnvelope()"></div>

<div class="inner-card" id="inviteCard">
  <img src="invite.jpg" alt="Wedding Invite"> 
  <div class="text-layer">
    <div class="strike-line" id="strike-rev"></div>
    <div class="strike-line" id="strike-mr"></div>
    <div class="strike-line" id="strike-mrs"></div>
    <div class="strike-line" id="strike-miss"></div>
    <div id="guest-name"></div>
  </div>
</div>

<script>
  // Browser URL එකෙන් නම ගන්නවා (උදා: ?name=Mr. Sandusha)
  var urlParams = new URLSearchParams(window.location.search);
  var fullName = urlParams.get('name') || "Guest"; 

  window.onload = function() {
    var title = "";
    var nameOnly = fullName;
    var match = fullName.match(/^(Mr|Mrs|Miss|Rev)\.?\s*(.*)/i); 
    
    if(match) {
      title = match[1].toUpperCase(); 
      nameOnly = match[2]; 
    }

    document.getElementById('guest-name').innerText = nameOnly;

    if(title === "MR") {
      document.getElementById('strike-rev').style.display = "block";
      document.getElementById('strike-mrs').style.display = "block";
      document.getElementById('strike-miss').style.display = "block";
    } else if (title === "MRS") {
      document.getElementById('strike-rev').style.display = "block";
      document.getElementById('strike-mr').style.display = "block";
      document.getElementById('strike-miss').style.display = "block";
    } else if (title === "MISS") {
      document.getElementById('strike-rev').style.display = "block";
      document.getElementById('strike-mr').style.display = "block";
      document.getElementById('strike-mrs').style.display = "block";
    } else if (title === "REV") {
      document.getElementById('strike-mr').style.display = "block";
      document.getElementById('strike-mrs').style.display = "block";
      document.getElementById('strike-miss').style.display = "block";
    }
  };

  function openEnvelope() {
    document.body.classList.add('open-state');
  }
</script>
</body>
</html>
