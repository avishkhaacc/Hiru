<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiruni & Udayanga's Wedding Invitation</title>
  
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: 'Times New Roman', serif; color: #fff; }
    
    /* --- Loading Screen --- */
    #loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d0d0d; z-index: 9999;
      display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 1.5s ease;
    }
    .loader-content { text-align: center; opacity: 0; animation: fadeIn 1s ease forwards 0.5s; }
    .spinner {
      border: 3px solid rgba(212, 175, 55, 0.1); border-top: 3px solid #d4af37;
      border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    #loader p { color: #d4af37; font-size: 18px; letter-spacing: 2px; margin: 0; }

    /* --- 3D Scene Container --- */
    .desk-container {
      position: relative; width: 100%; height: 100%; perspective: 1500px;
      display: flex; justify-content: center; align-items: center;
    }

    .desk-bg {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-image: url('table.jpg'); background-size: cover; background-position: center;
      transition: filter 2s ease, transform 2s ease; z-index: 1;
    }

    .dark-overlay { 
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(0,0,0,0); transition: background 2s ease; z-index: 2; pointer-events: none; 
    }

    /* --- Envelope --- */
    .envelope-wrapper {
      position: relative; width: 320px; height: 450px; z-index: 4; cursor: pointer;
      transition: transform 2s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d;
      transform: rotateX(15deg) rotateY(-10deg) rotateZ(0deg);
    }

    .envelope-cover {
      position: absolute; width: 100%; height: 100%; background-image: url('card.png'); 
      background-size: contain; background-repeat: no-repeat; background-position: center;
      z-index: 2; backface-visibility: hidden;
    }

    /* --- Inner Card --- */
    .inner-card {
      position: absolute; top: 5%; left: 5%; width: 90%; height: 90%; 
      transform: translateZ(-1px); opacity: 0; z-index: 1;
      transition: transform 2s cubic-bezier(0.2, 1, 0.3, 1), opacity 1.5s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .inner-card img { width: 100%; height: 100%; display: block; border-radius: 5px; }

    /* --- Action Buttons --- */
    .action-buttons {
      position: absolute; bottom: 40px; /* කාඩ් එකට ගොඩක් පහළින් දැම්මා */
      display: flex; gap: 15px; justify-content: center; width: 100%;
      opacity: 0; z-index: 20; transform: translateY(20px);
      transition: opacity 1s ease 2.5s, transform 1s ease 2.5s;
    }
    .btn {
      padding: 10px 20px; background: rgba(212, 175, 55, 0.95); color: #fff;
      text-decoration: none; border-radius: 25px; font-size: 12px; font-weight: bold;
      font-family: sans-serif; text-transform: uppercase; letter-spacing: 1px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: background 0.3s;
      display: flex; align-items: center; gap: 8px;
    }
    .btn:hover { background: #fff; color: #d4af37; }
    .icon { font-size: 16px; }

    /* --- Animation States --- */
    .open-state .desk-bg { filter: blur(8px) brightness(0.3); transform: scale(1.1); }
    .open-state .dark-overlay { background: rgba(0,0,0,0.5); }
    .open-state .envelope-wrapper { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg) translateZ(100px); pointer-events: none; }
    
    /* කාඩ් එක ස්ක්‍රීන් එකට වඩා පොඩි වෙන්න scale(0.9) දැම්මා. ටිකක් උඩට වෙන්න translateY(-20px) දැම්මා */
    .open-state .inner-card { transform: translateZ(50px) translateY(-20px) scale(0.9); opacity: 1; z-index: 10; }
    .open-state .action-buttons { opacity: 1; transform: translateY(0); }

    /* --- නම සහ කැපෙන ඉරි (Matched to card print size) --- */
    .text-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 11; pointer-events: none; }
    
    .strike-line { position: absolute; height: 1px; background: rgba(30,30,30,0.8); top: 51.5%; display: none; }
    /* ඉරි වල දිග සහ ස්ථානය තවත් නිවැරදි කළා */
    #strike-rev { left: 7.5%; width: 6.5%; }
    #strike-mr { left: 14%; width: 4.5%; }
    #strike-mrs { left: 18.5%; width: 6%; }
    #strike-miss { left: 24.5%; width: 6.5%; }

    #guest-name { 
      position: absolute; top: 50%; left: 45%; 
      font-size: 11px; /* ෆොන්ට් එක ගොඩක් පොඩි කළා */
      font-weight: normal; /* මහත ගතිය අයින් කළා කාඩ් එකට මැච් වෙන්න */
      color: #222; font-family: 'Times New Roman', serif; 
      white-space: nowrap; text-transform: uppercase; letter-spacing: 0.5px;
    }

    /* --- Footer Watermark --- */
    .watermark-footer {
      position: fixed; bottom: 10px; width: 100%; text-align: center;
      z-index: 999; opacity: 0.7; font-family: sans-serif; font-size: 11px; color: #fff;
      pointer-events: auto; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }
    .watermark-footer a { color: #d4af37; text-decoration: none; font-weight: bold; letter-spacing: 0.5px; }
    .watermark-footer a:hover { color: #fff; text-decoration: underline; }
  </style>
</head>
<body id="body">

<div id="loader">
  <div class="loader-content">
    <div class="spinner"></div>
    <p>HIRUNI & UDAYANGA</p>
  </div>
</div>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="desk-container">
  <div class="desk-bg"></div>
  <div class="dark-overlay"></div>

  <div class="envelope-wrapper" onclick="openEnvelope()">
    <div class="envelope-cover"></div>
    
    <div class="inner-card" id="inviteCard">
      <img src="invite.jpg" alt="Wedding Invite"> 
      
      <div class="text-layer">
        <div class="strike-line" id="strike-rev"></div>
        <div class="strike-line" id="strike-mr"></div>
        <div class="strike-line" id="strike-mrs"></div>
        <div class="strike-line" id="strike-miss"></div>
        <div id="guest-name"></div>
      </div>
    </div>
  </div>

  <div class="action-buttons">
    <a href="YOUR_GOOGLE_MAPS_LINK_HERE" target="_blank" class="btn"><span class="icon">📍</span> View Map</a>
    <a href="YOUR_CALENDAR_EVENT_LINK_HERE" target="_blank" class="btn"><span class="icon">📅</span> Add to Calendar</a>
  </div>
</div>

<div class="watermark-footer">
  <a href="YOUR_LINK_HERE" target="_blank"> © 2025 DesignVerse by Sandusha Avishkha. All rights reserved. Crafted with passion in Minuwangoda, Sri Lanka</a>
</div>

<script>
  var urlParams = new URLSearchParams(window.location.search);
  var fullName = urlParams.get('name') || "Guest"; 

  window.onload = function() {
    var loader = document.getElementById('loader');
    loader.style.opacity = '0';
    setTimeout(function() { loader.style.display = 'none'; }, 1500);

    var title = "";
    var nameOnly = fullName;
    var match = fullName.match(/^(Mr|Mrs|Miss|Rev)\.?\s*(.*)/i); 
    
    if(match) {
      title = match[1].toUpperCase(); 
      nameOnly = match[2]; 
    }

    document.getElementById('guest-name').innerText = nameOnly;

    if(title === "MR") {
      document.getElementById('strike-rev').style.display = "block";
      document.getElementById('strike-mrs').style.display = "block";
      document.getElementById('strike-miss').style.display = "block";
    } else if (title === "MRS") {
      document.getElementById('strike-rev').style.display = "block";
      document.getElementById('strike-mr').style.display = "block";
      document.getElementById('strike-miss').style.display = "block";
    } else if (title === "MISS") {
      document.getElementById('strike-rev').style.display = "block";
      document.getElementById('strike-mr').style.display = "block";
      document.getElementById('strike-mrs').style.display = "block";
    } else if (title === "REV") {
      document.getElementById('strike-mr').style.display = "block";
      document.getElementById('strike-mrs').style.display = "block";
      document.getElementById('strike-miss').style.display = "block";
    }
  };

  function openEnvelope() {
    document.getElementById('body').classList.add('open-state');
    var music = document.getElementById('bgMusic');
    music.play().catch(function(error) {});

    confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#d4af37', '#ffffff', '#a67c00'] });
    setTimeout(function() {
      confetti({ particleCount: 50, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#d4af37', '#fff'] });
      confetti({ particleCount: 50, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#d4af37', '#fff'] });
    }, 1500);
  }
</script>
</body>
</html>
